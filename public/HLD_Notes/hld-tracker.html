<div id="root">
  <div class="loading" id="loading">Loading your tracker…</div>
</div>

<style>
  :root {
    --bg: #0d131b;
    --surface: #141d27;
    --surface-2: #1b2531;
    --surface-3: #223040;
    --border: #263544;
    --border-soft: #1e2a37;
    --text: #e7eef5;
    --muted: #8497a8;
    --faint: #5c6c7c;
    --accent: #45c4e6;
    --accent-dim: #2b7f95;
    --doing: #f0a63c;
    --done: #4ade80;
    --grid: rgba(69,196,230,0.035);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  #root {
    font-family: var(--sans);
    color: var(--text);
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 26px 26px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 26px 26px,
      var(--bg);
    min-height: 100vh;
    padding: 32px 20px 80px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .loading { color: var(--muted); font-family: var(--mono); padding: 60px 0; text-align: center; }

  .wrap { max-width: 860px; margin: 0 auto; }

  .head { margin-bottom: 30px; }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 10px;
  }
  .title { font-size: 30px; font-weight: 680; letter-spacing: -0.02em; margin: 0 0 6px; }
  .subtitle { color: var(--muted); margin: 0; font-size: 14px; }

  .overall {
    margin-top: 22px; border: 1px solid var(--border); background: var(--surface);
    border-radius: 12px; padding: 18px 20px; display: flex; align-items: center;
    gap: 20px; flex-wrap: wrap;
  }
  .ring-wrap { display: flex; align-items: center; gap: 16px; }
  .ring { width: 62px; height: 62px; flex: none; }
  .ring-track { fill: none; stroke: var(--surface-3); stroke-width: 7; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
  .ring-num { font-family: var(--mono); font-size: 15px; font-weight: 600; fill: var(--text); }
  .overall-meta .big { font-size: 15px; font-weight: 600; }
  .overall-meta .small { font-size: 12.5px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

  .legend { margin-left: auto; display: flex; gap: 16px; flex-wrap: wrap; }
  .legend span { font-family: var(--mono); font-size: 11px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
  .dot.todo { border: 1.5px solid var(--faint); }
  .dot.doing { background: var(--doing); }
  .dot.done { background: var(--done); }

  .toolbar { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
  .btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.03em;
    color: var(--muted); background: var(--surface); border: 1px solid var(--border);
    padding: 7px 13px; border-radius: 7px; cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { color: var(--text); border-color: var(--accent-dim); }
  .btn.active { color: var(--accent); border-color: var(--accent-dim); background: var(--surface-2); }
  .filters { display: flex; gap: 8px; }
  .spacer { flex: 1; }

  .tier { margin-top: 34px; }
  .tier-head {
    display: flex; align-items: baseline; gap: 12px;
    padding-bottom: 10px; margin-bottom: 4px; border-bottom: 1px solid var(--border-soft);
  }
  .tier-label { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
  .tier.easy .tier-label { color: var(--done); }
  .tier.medium .tier-label { color: var(--doing); }
  .tier.hard .tier-label { color: #f2708a; }
  .tier-count { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-left: auto; }
  .tier-bar { height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
  .tier-bar > i { display: block; height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .tier.easy .tier-bar > i { background: var(--done); }
  .tier.medium .tier-bar > i { background: var(--doing); }
  .tier.hard .tier-bar > i { background: #f2708a; }

  .row { border: 1px solid var(--border-soft); background: var(--surface); border-radius: 10px;
    margin-top: 8px; overflow: hidden; transition: border-color 0.15s; }
  .row:hover { border-color: var(--border); }
  .row.done { opacity: 0.62; }
  .row-main { display: flex; align-items: center; gap: 14px; padding: 12px 14px; }

  .node { width: 26px; height: 26px; flex: none; border-radius: 6px; cursor: pointer;
    background: var(--surface-2); border: 1.5px solid var(--faint);
    display: grid; place-items: center; padding: 0; position: relative; transition: all 0.18s; }
  .node:hover { border-color: var(--accent); }
  .node svg { width: 14px; height: 14px; }
  .node .glyph { opacity: 0; transition: opacity 0.15s; }
  .row.doing .node { border-color: var(--doing); background: rgba(240,166,60,0.12); }
  .row.doing .node .glyph.doing { opacity: 1; stroke: var(--doing); }
  .row.done .node { border-color: var(--done); background: rgba(74,222,128,0.15); }
  .row.done .node .glyph.done { opacity: 1; stroke: var(--done); }

  .num { font-family: var(--mono); font-size: 12px; color: var(--faint); width: 30px; flex: none; }
  .name { font-size: 14.5px; font-weight: 500; flex: 1; letter-spacing: -0.005em; }
  .name.linked { cursor: pointer; }
  .name.linked:hover { color: var(--accent); }
  .row.done .name { text-decoration: line-through; text-decoration-color: var(--faint); }
  .tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 5px; color: var(--faint); border: 1px solid var(--border); }
  .row.doing .tag { color: var(--doing); border-color: rgba(240,166,60,0.4); }
  .row.done .tag { color: var(--done); border-color: rgba(74,222,128,0.35); }

  /* PDF link (path comes from code) */
  .notes-link {
    font-family: var(--mono); font-size: 11.5px; text-decoration: none;
    color: var(--accent); border: 1px solid var(--accent-dim); background: rgba(69,196,230,0.08);
    padding: 5px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s; white-space: nowrap;
  }
  .notes-link:hover { background: rgba(69,196,230,0.16); }
  .no-pdf {
    font-family: var(--mono); font-size: 11px; color: var(--faint);
    border: 1px dashed var(--border); padding: 5px 10px; border-radius: 6px; white-space: nowrap;
  }

  .footer { margin-top: 40px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--faint); }

  .modal-back { position: fixed; inset: 0; background: rgba(5,9,13,0.7); backdrop-filter: blur(2px);
    display: none; place-items: center; padding: 24px; z-index: 50; }
  .modal-back.open { display: grid; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 640px; max-height: 82vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-head { padding: 16px 18px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; }
  .modal-head h3 { margin: 0; font-size: 15px; }
  .modal-head .btn { margin-left: auto; }
  .modal textarea { flex: 1; margin: 0; border: none; background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 12px; line-height: 1.6; padding: 16px 18px; resize: none; outline: none; }
  .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border-soft); display: flex; gap: 10px; justify-content: flex-end; }

  @media (max-width: 560px) {
    #root { padding: 22px 12px 60px; }
    .title { font-size: 24px; }
    .legend { width: 100%; margin-left: 0; }
    .tag { display: none; }
  }
</style>

<script>
  /*
    TIERS data structure  —  single source of truth (no storage)
    -------------------------------------------------------------
    Every topic is an object:

      { name: "…", pdf: "…", status: "todo" | "doing" | "done" }

      • name   — display name (required)
      • pdf    — path/URL to the notes PDF; "" or omitted = no PDF linked
      • status — "todo" (default) | "doing" | "done"

    Plain strings still work as a shorthand for { name, pdf:"", status:"todo" }.

    Status lives HERE. Set it in the array to define the starting state.
    Clicking the node cycles it in memory for the current session; since
    there is no storage, a reload resets to whatever is written below.
  */
  const TIERS = [
    {
      key: "easy",
      label: "Easy",
      blurb: "Bounded scope · object modelling & entry-level distributed systems",
      topics: [
        { name: "Vending Machine", pdf: "" },
        { name: "Parking Garage", pdf: "" },
        { name: "URL Shortener (TinyURL)", pdf: "url-shortener-tinyurl.pdf", status: "done" },
        { name: "Online Bookstore (Amazon)", pdf: "" },
        { name: "Text Storage (Pastebin)", pdf: "" },
        { name: "Authentication System", pdf: "" },
        { name: "Content Delivery Network (CDN)", pdf: "" },
        { name: "Distributed Cache", pdf: "" },
        { name: "Distributed Job Scheduler", pdf: "" },
        { name: "Distributed Key-Value Store", pdf: "" },
      ],
    },
    {
      key: "medium",
      label: "Medium",
      blurb: "Real products · read/write scale, feeds, storage & consistency tradeoffs",
      topics: [
        { name: "Rate Limiter", pdf: "" },
        { name: "Notification Service", pdf: "" },
        { name: "Autocomplete for Search", pdf: "" },
        { name: "Online Code Editor", pdf: "" },
        { name: "Twitter", pdf: "" },
        { name: "Reddit", pdf: "" },
        { name: "Instagram", pdf: "" },
        { name: "Tinder", pdf: "" },
        { name: "Facebook", pdf: "" },
        { name: "WhatsApp", pdf: "" },
        { name: "TikTok", pdf: "" },
        { name: "YouTube", pdf: "" },
        { name: "Netflix", pdf: "" },
        { name: "Spotify", pdf: "" },
        { name: "Shopify", pdf: "" },
        { name: "E-commerce (Amazon)", pdf: "" },
        { name: "Google Search", pdf: "" },
        { name: "Payment System", pdf: "" },
        { name: "Flight Booking System", pdf: "" },
        { name: "Distributed Message Queue (Kafka)", pdf: "" },
        { name: "Analytics Platform (Logging, Metrics)", pdf: "" },
        { name: "Stock Exchange System", pdf: "" },
      ],
    },
    {
      key: "hard",
      label: "Hard",
      blurb: "Deep systems · coordination, geo-scale, real-time & strong guarantees",
      topics: [
        { name: "Distributed Locking Service", pdf: "" },
        { name: "Distributed Web Crawler", pdf: "" },
        { name: "File Sharing (Dropbox)", pdf: "" },
        { name: "Object Storage (S3)", pdf: "" },
        { name: "Ticket Booking (BookMyShow)", pdf: "" },
        { name: "Location-Based Service (Yelp)", pdf: "" },
        { name: "Code Deployment System", pdf: "" },
        { name: "Food Delivery (DoorDash)", pdf: "" },
        { name: "Google Docs", pdf: "" },
        { name: "Uber", pdf: "" },
        { name: "Zoom", pdf: "" },
        { name: "Google Maps", pdf: "" },
      ],
    },
  ];

  const STATES = ["todo", "doing", "done"];
  const STATUS_TXT = { todo: "To do", doing: "Doing", done: "Done" };

  // Normalize the array in place: every topic becomes { name, pdf, status }.
  // Strings become objects, missing fields get defaults. We mutate these
  // objects directly, so they are the live source of truth.
  TIERS.forEach((tier) => {
    tier.topics = tier.topics.map((t) => {
      const o = typeof t === "string" ? { name: t } : t;
      const status = STATES.includes(o.status) ? o.status : "todo";
      return { name: o.name, pdf: (o.pdf || "").trim(), status };
    });
  });

  let filter = "all";

  function counts(tier) {
    let done = 0, doing = 0;
    tier.topics.forEach((t) => {
      if (t.status === "done") done++;
      else if (t.status === "doing") doing++;
    });
    return { done, doing, total: tier.topics.length };
  }

  const svgNode = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path class="glyph done" d="M5 12.5l4.5 4.5L19 7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle class="glyph doing" cx="12" cy="12" r="4.5" stroke-width="2.2" fill="none"/>
    </svg>`;

  function render() {
    const root = document.getElementById("root");
    const allTopics = TIERS.reduce((a, t) => a + t.topics.length, 0);
    let totalDone = 0, totalDoing = 0;
    TIERS.forEach((t) => {
      const c = counts(t);
      totalDone += c.done;
      totalDoing += c.doing;
    });
    const pct = Math.round((totalDone / allTopics) * 100);
    const circ = 2 * Math.PI * 26;
    const offset = circ * (1 - totalDone / allTopics);

    let html = `<div class="wrap">
      <div class="head">
        <p class="eyebrow">System Design · HLD Roadmap</p>
        <h1 class="title">HLD Study Tracker</h1>
        <p class="subtitle">${allTopics} designs across three tiers. Status and PDF paths are defined in the code. Tap the node to cycle To&nbsp;do → Doing → Done (this session), or click a topic to open its PDF.</p>

        <div class="overall">
          <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 62 62">
              <circle class="ring-track" cx="31" cy="31" r="26"></circle>
              <circle class="ring-fill" cx="31" cy="31" r="26"
                stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"></circle>
              <text class="ring-num" x="31" y="36" text-anchor="middle">${pct}%</text>
            </svg>
            <div class="overall-meta">
              <div class="big">${totalDone} of ${allTopics} complete</div>
              <div class="small">${totalDoing} in progress · ${allTopics - totalDone - totalDoing} not started</div>
            </div>
          </div>
          <div class="legend">
            <span><i class="dot todo"></i>To do</span>
            <span><i class="dot doing"></i>Doing</span>
            <span><i class="dot done"></i>Done</span>
          </div>
        </div>

        <div class="toolbar">
          <div class="filters">
            ${["all", "todo", "doing", "done"]
              .map(
                (f) =>
                  `<button class="btn filter-btn ${filter === f ? "active" : ""}" data-filter="${f}">${f === "all" ? "All" : STATUS_TXT[f]}</button>`,
              )
              .join("")}
          </div>
          <div class="spacer"></div>
          <button class="btn" id="export-btn">↓ Export index</button>
        </div>
      </div>`;

    TIERS.forEach((tier, tierIdx) => {
      const c = counts(tier);
      const w = Math.round((c.done / c.total) * 100);
      html += `<section class="tier ${tier.key}">
        <div class="tier-head">
          <span class="tier-label">${tier.label}</span>
          <span class="subtitle" style="font-size:12.5px">${tier.blurb}</span>
          <span class="tier-count">${c.done}/${c.total}</span>
        </div>
        <div class="tier-bar"><i style="width:${w}%"></i></div>`;

      tier.topics.forEach((topic, i) => {
        if (filter !== "all" && topic.status !== filter) return;
        const n = String(i + 1).padStart(2, "0");
        const hasPdf = topic.pdf.length > 0;

        const linkControl = hasPdf
          ? `<a class="notes-link" href="${escapeAttr(topic.pdf)}" target="_blank" rel="noopener" title="${escapeAttr(topic.pdf)}">Open PDF ↗</a>`
          : `<span class="no-pdf">no PDF</span>`;

        html += `<div class="row ${topic.status}">
          <div class="row-main">
            <button class="node" data-t="${tierIdx}" data-i="${i}" title="${STATUS_TXT[topic.status]} — click to change" aria-label="Status: ${STATUS_TXT[topic.status]}">${svgNode}</button>
            <span class="num">${tier.label[0]}${n}</span>
            <span class="name ${hasPdf ? "linked" : ""}"${hasPdf ? ` data-pdf="${escapeAttr(topic.pdf)}"` : ""}>${escapeHtml(topic.name)}</span>
            <span class="tag">${STATUS_TXT[topic.status]}</span>
            ${linkControl}
          </div>
        </div>`;
      });
      html += `</section>`;
    });

    html += `<div class="footer">Status &amp; PDF paths are defined in the TIERS array in code. Node changes are not saved between reloads.</div>
      </div>
      <div class="modal-back" id="modal-back">
        <div class="modal">
          <div class="modal-head"><h3>Your index — Markdown</h3><button class="btn" id="modal-close">Close</button></div>
          <textarea id="export-text" readonly></textarea>
          <div class="modal-foot"><button class="btn" id="copy-btn">Copy to clipboard</button></div>
        </div>
      </div>`;

    root.innerHTML = html;
    bind();
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g, "&quot;");
  }

  function bind() {
    // Node click mutates the topic object in the TIERS array directly.
    document.querySelectorAll(".node").forEach((btn) => {
      btn.addEventListener("click", () => {
        const topic = TIERS[+btn.dataset.t].topics[+btn.dataset.i];
        topic.status = STATES[(STATES.indexOf(topic.status) + 1) % 3];
        render();
      });
    });

    // Clicking a topic name (when it has a PDF) opens the PDF.
    document.querySelectorAll(".name.linked").forEach((el) =>
      el.addEventListener("click", () =>
        window.open(el.dataset.pdf, "_blank", "noopener"),
      ),
    );

    document.querySelectorAll(".filter-btn").forEach((b) =>
      b.addEventListener("click", () => {
        filter = b.dataset.filter;
        render();
      }),
    );

    document.getElementById("export-btn").addEventListener("click", openExport);
    document.getElementById("modal-close").addEventListener("click", () =>
      document.getElementById("modal-back").classList.remove("open"),
    );
    document.getElementById("modal-back").addEventListener("click", (ev) => {
      if (ev.target.id === "modal-back") ev.currentTarget.classList.remove("open");
    });
    document.getElementById("copy-btn").addEventListener("click", copyExport);
  }

  function buildMarkdown() {
    let md = "# HLD Study Tracker\n\n";
    const mark = { todo: "[ ]", doing: "[~]", done: "[x]" };
    TIERS.forEach((tier) => {
      md += `\n## ${tier.label}\n\n`;
      tier.topics.forEach((t) => {
        const link = t.pdf ? `[${t.name}](${t.pdf})` : t.name;
        md += `- ${mark[t.status]} ${link}\n`;
      });
    });
    return md;
  }

  function openExport() {
    document.getElementById("export-text").value = buildMarkdown();
    document.getElementById("modal-back").classList.add("open");
  }
  function copyExport() {
    const ta = document.getElementById("export-text");
    ta.select();
    const btn = document.getElementById("copy-btn");
    try {
      const ok = document.execCommand("copy");
      btn.textContent = ok ? "Copied ✓" : "Select + copy manually";
    } catch (e) {
      btn.textContent = "Select + copy manually";
    }
    setTimeout(() => {
      btn.textContent = "Copy to clipboard";
    }, 1800);
  }

  render();
</script>
