<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182230"/>
      <stop offset="1" stop-color="#0b1017"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ad9f0"/>
      <stop offset="1" stop-color="#45c4e6"/>
    </linearGradient>
    <clipPath id="round"><rect x="2" y="2" width="60" height="60" rx="14"/></clipPath>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)" stroke="#2b3b4b" stroke-width="1.5"/>

  <!-- faint blueprint grid -->
  <g clip-path="url(#round)" stroke="#45c4e6" stroke-width="1" opacity="0.06">
    <path d="M14 2V62 M26 2V62 M38 2V62 M50 2V62 M2 14H62 M2 26H62 M2 38H62 M2 50H62"/>
  </g>

  <!-- open book (matches the Study Desk brand mark) -->
  <g transform="translate(15.2,17) scale(1.4)" fill="rgba(69,196,230,0.12)"
     stroke="url(#ink)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>
    <path d="M12 7v14" fill="none"/>
  </g>
</svg>
